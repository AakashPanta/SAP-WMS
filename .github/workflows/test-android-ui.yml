name: Test Android UI

on:
  workflow_dispatch:

jobs:
  android-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create log directory
        run: mkdir -p ci-logs

      - name: Sync Expo dependencies first
        env:
          CI: "1"
          EXPO_NO_GIT_STATUS: "1"
        run: |
          set -o pipefail
          npx expo install --fix 2>&1 | tee ci-logs/01-expo-install-fix.log
          pnpm install --no-frozen-lockfile 2>&1 | tee ci-logs/02-pnpm-install-after-fix.log

      - name: Generate native Android project
        env:
          CI: "1"
          EXPO_NO_GIT_STATUS: "1"
        run: |
          set -o pipefail

          rm -rf android

          npx expo prebuild --platform android --no-install 2>&1 | tee ci-logs/03-expo-prebuild.log

          pnpm install --no-frozen-lockfile 2>&1 | tee ci-logs/04-pnpm-install-after-prebuild.log

      - name: Show Android project structure
        run: |
          {
            echo "=== android directory ==="
            find android -maxdepth 3 -type f | sort
          } | tee ci-logs/05-android-project-structure.log

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android emulator and smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          working-directory: artifacts/mobile/android
          script: |
            set -o pipefail

            ./gradlew assembleDebug 2>&1 | tee ../ci-logs/06-gradle-assemble-debug.log

            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
            if [ ! -f "$APK_PATH" ]; then
              echo "APK not found at $APK_PATH" | tee -a ../ci-logs/06-gradle-assemble-debug.log
              find app/build/outputs -type f | sort | tee ../ci-logs/07-apk-output-files.log || true
              exit 1
            fi

            adb install -r "$APK_PATH" 2>&1 | tee ../ci-logs/08-adb-install.log

            APP_ID=$(node -e "const app=require('../app.json'); console.log((app.expo && app.expo.android && app.expo.android.package) || '')")
            if [ -z "$APP_ID" ]; then
              echo "Could not determine Android package name from app.json" | tee ../ci-logs/09-app-id.log
              exit 1
            fi

            echo "$APP_ID" | tee ../ci-logs/09-app-id.log

            adb shell monkey -p "$APP_ID" -c android.intent.category.LAUNCHER 1 2>&1 | tee ../ci-logs/10-app-launch.log
            sleep 20

            adb exec-out screencap -p > ../android-smoke-test.png
            adb logcat -d > ../ci-logs/11-logcat.txt || true

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-test
          path: artifacts/mobile/android-smoke-test.png
          if-no-files-found: warn

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-test-logs
          path: artifacts/mobile/ci-logs
          if-no-files-found: warn
