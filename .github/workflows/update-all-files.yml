name: Update All Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create required directories
        run: |
          mkdir -p .github/workflows
          mkdir -p artifacts/mobile

      - name: Replace build-android.yml
        run: |
          cat > .github/workflows/build-android.yml <<'YAML'
          name: Build Android APK

          on:
            workflow_dispatch:
              inputs:
                profile:
                  description: "EAS build profile"
                  required: true
                  default: "preview"
                  type: choice
                  options:
                    - preview
                    - production
            push:
              branches:
                - main
              paths:
                - "artifacts/mobile/**"

          permissions:
            contents: read

          jobs:
            build-android:
              name: Build Android APK
              runs-on: ubuntu-latest
              defaults:
                run:
                  working-directory: artifacts/mobile

              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Set up Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: "20"

                - name: Set up EAS
                  uses: expo/expo-github-action@v8
                  with:
                    eas-version: latest
                    token: ${{ secrets.EXPO_TOKEN }}

                - name: Install pnpm
                  run: npm install -g pnpm

                - name: Install dependencies
                  run: pnpm install

                - name: Build Android on EAS
                  run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive --wait
                  env:
                    EXPO_PUBLIC_DOMAIN: ${{ secrets.REPLIT_DEV_DOMAIN || 'localhost' }}

            build-info:
              name: Build Summary
              runs-on: ubuntu-latest
              needs: build-android
              if: always()
              steps:
                - name: Print summary
                  run: |
                    echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
                    echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
                    echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
                    echo "| Platform | Android |" >> $GITHUB_STEP_SUMMARY
                    echo "| Profile | ${{ github.event.inputs.profile || 'preview' }} |" >> $GITHUB_STEP_SUMMARY
                    echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
                    echo "| Status | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "Download the APK from the Expo build link shown in the build logs/dashboard." >> $GITHUB_STEP_SUMMARY
          YAML

      - name: Replace eas.json
        run: |
          cat > artifacts/mobile/eas.json <<'JSON'
          {
            "cli": {
              "version": ">= 5.9.1",
              "appVersionSource": "remote"
            },
            "build": {
              "development": {
                "developmentClient": true,
                "distribution": "internal",
                "android": {
                  "gradleCommand": ":app:assembleDebug",
                  "buildType": "apk"
                },
                "env": {
                  "EXPO_PUBLIC_DOMAIN": "localhost"
                }
              },
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                },
                "ios": {
                  "simulator": false
                }
              },
              "production": {
                "android": {
                  "buildType": "apk"
                },
                "autoIncrement": true
              }
            },
            "submit": {
              "production": {
                "android": {
                  "serviceAccountKeyPath": "./google-services.json",
                  "track": "internal"
                }
              }
            }
          }
          JSON

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-android.yml artifacts/mobile/eas.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Android build workflow and eas config"
          git push
